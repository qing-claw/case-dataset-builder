<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Case Dataset Builder</title>
    <meta name="description" content="一个可部署到 GitHub Pages 的动漫文生图 case 数据集制作工具。" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div>
            <h1>Case Dataset Builder</h1>
            <p>轻一点。先把 case 写清楚，再谈别的。</p>
          </div>
        </div>

        <div class="sidebar-tools stacked">
          <button id="add-case-btn" class="primary full">+ 新建 case</button>
          <input id="search-input" type="search" placeholder="搜索维度 / 子项 / prompt" />
          <select id="dimension-filter">
            <option value="">全部维度</option>
          </select>
        </div>

        <div id="case-list" class="case-list"></div>
      </aside>

      <main class="main-panel">
        <header class="topbar compact">
          <div>
            <h2 id="editor-title">未选择 case</h2>
            <p id="editor-subtitle">一个 case 一个子文件夹</p>
          </div>
          <div class="topbar-actions">
            <label class="import-btn">
              导入 ZIP
              <input id="import-zip-input" type="file" accept=".zip" hidden />
            </label>
            <button id="duplicate-case-btn">复制</button>
            <button id="delete-case-btn" class="danger">删除</button>
            <button id="export-case-btn">导出当前 case</button>
            <button id="export-dataset-btn" class="primary">导出数据集 ZIP</button>
            <button id="theme-toggle-btn" class="icon-btn" title="切换明暗模式">☾</button>
          </div>
        </header>

        <section id="empty-state" class="empty-state">
          <h3>先建第一条 case</h3>
          <p>只保留最关键的字段，别让工具比数据本身还吵。</p>
        </section>

        <section id="editor" class="editor hidden">
          <div class="editor-grid two-column-wide">
            <section class="card ref-card left-panel">
              <div class="field no-gap">
                <div class="field-row">
                  <label>参考图 / 参考素材</label>
                </div>
                <label id="ref-dropzone" class="ref-dropzone unified-dropzone">
                  <input id="ref-upload" type="file" accept="image/*" multiple hidden />
                  <strong>拖拽图片到这里，或点击上传</strong>
                  <p>统一入口，不分家。上传后会自动写成 `ref/ref_XX.ext`。</p>
                </label>
                <div id="ref-grid" class="ref-grid empty">暂无参考图</div>
              </div>
            </section>

            <section class="card form-card single-column">
              <div class="field">
                <label for="folder-name">文件夹名</label>
                <input id="folder-name" type="text" placeholder="例如：style_restore_001" />
                <small>导出时会作为 case 子文件夹名。</small>
              </div>

              <div class="field">
                <div class="field-title-row">
                  <label>dimension（多选）</label>
                  <button id="show-dimension-custom-btn" class="ghost-btn" type="button">新增维度</button>
                </div>
                <div id="dimension-list" class="token-list"></div>
                <div class="select-add-row">
                  <select id="dimension-select">
                    <option value="">选择一个维度</option>
                  </select>
                  <button id="add-dimension-select-btn">加入当前 case</button>
                </div>
                <div id="dimension-custom-wrap" class="inline-add hidden">
                  <input id="dimension-custom-input" type="text" placeholder="输入新的 dimension，例如：整体可用性" />
                  <button id="confirm-dimension-custom-btn">新增并加入</button>
                </div>
              </div>

              <div class="field">
                <div class="field-title-row">
                  <label>sub_dimension（多选）</label>
                  <button id="show-sub-dimension-custom-btn" class="ghost-btn" type="button">新增子项</button>
                </div>
                <div id="sub-dimension-list" class="token-list"></div>
                <div class="select-add-row">
                  <select id="sub-dimension-select">
                    <option value="">选择一个子项</option>
                  </select>
                  <button id="add-sub-dimension-select-btn">加入当前 case</button>
                </div>
                <div id="sub-dimension-custom-wrap" class="inline-add hidden">
                  <input id="sub-dimension-custom-input" type="text" placeholder="输入新的 sub_dimension，例如：角色一致性保持" />
                  <button id="confirm-sub-dimension-custom-btn">新增并加入</button>
                </div>
              </div>

              <div class="field">
                <label>prompt（字符串列表）</label>
                <div id="prompt-list" class="textarea-list"></div>
                <button id="add-prompt-btn">新增 prompt</button>
              </div>

              <div class="field">
                <label>check_points（可选）</label>
                <div id="check-point-list" class="token-list"></div>
                <div class="inline-add">
                  <input id="check-point-input" type="text" placeholder="输入一个检查点后回车" />
                  <button data-add="check_points">添加</button>
                </div>
              </div>

              <div class="field">
                <label for="pass-rule">pass_rule（可选）</label>
                <textarea id="pass-rule" rows="3" placeholder="例如：3 个检查点满足 2 个及以上算通过"></textarea>
              </div>

              <div id="validation-box" class="validation-box"></div>
            </section>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
