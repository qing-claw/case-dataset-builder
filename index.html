<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Case Dataset Builder</title>
    <meta name="description" content="一个可部署到 GitHub Pages 的动漫文生图 case 数据集制作工具。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Sora:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div>
            <h1>Case Dataset Builder</h1>
            <p>Case 编辑器</p>
          </div>
        </div>

        <div class="sidebar-tools stacked">
          <button id="add-case-btn" class="primary full">+ 新建 case</button>
          <input id="search-input" type="search" placeholder="搜索维度 / 子项 / prompt" />
          <select id="dimension-filter">
            <option value="">全部维度</option>
          </select>
        </div>

        <div id="case-list" class="case-list"></div>
      </aside>

      <main class="main-panel">
        <header class="topbar compact">
          <div>
            <h2 id="editor-title">未选择 case</h2>
            <p id="editor-subtitle"></p>
          </div>
          <div class="topbar-actions">
            <label class="import-btn">
              导入 ZIP
              <input id="import-zip-input" type="file" accept=".zip" hidden />
            </label>
            <button id="preview-json-btn">预览 JSON</button>
            <button id="duplicate-case-btn">复制</button>
            <button id="delete-case-btn" class="danger">删除</button>
            <button id="export-case-btn">导出当前 case</button>
            <button id="export-dataset-btn" class="primary">导出数据集 ZIP</button>
            <button id="theme-toggle-btn" class="icon-btn" title="切换明暗模式">☾</button>
          </div>
        </header>

        <section id="empty-state" class="empty-state">
          <h3>新建 case</h3>
        </section>

        <section id="editor" class="editor hidden">
          <div class="editor-grid two-column-wide">
            <section class="card form-card single-column">
              <div class="field">
                <label for="folder-name">文件夹名</label>
                <input id="folder-name" type="text" placeholder="case_001" />
              </div>

              <div class="field">
                <div class="field-title-row">
                  <label>dimension</label>
                  <button id="show-dimension-custom-btn" class="ghost-btn" type="button">新增维度</button>
                </div>
                <div id="dimension-list" class="token-list"></div>
                <div class="select-add-row">
                  <select id="dimension-select">
                    <option value="">选择</option>
                  </select>
                  <button id="clear-dimension-btn" class="danger" type="button">清空</button>
                </div>
                <div id="dimension-custom-wrap" class="inline-add hidden">
                  <input id="dimension-custom-input" type="text" placeholder="dimension" />
                  <button id="confirm-dimension-custom-btn">新增</button>
                </div>
              </div>

              <div class="field">
                <div class="field-title-row">
                  <label>sub_dimension</label>
                  <button id="show-sub-dimension-custom-btn" class="ghost-btn" type="button">新增子项</button>
                </div>
                <div id="sub-dimension-list" class="token-list"></div>
                <div class="select-add-row">
                  <select id="sub-dimension-select">
                    <option value="">选择</option>
                  </select>
                  <button id="clear-sub-dimension-btn" class="danger" type="button">清空</button>
                </div>
                <div id="sub-dimension-custom-wrap" class="inline-add hidden">
                  <input id="sub-dimension-custom-input" type="text" placeholder="sub_dimension" />
                  <button id="confirm-sub-dimension-custom-btn">新增</button>
                </div>
              </div>

              <div class="field">
                <label>prompt</label>
                <div id="prompt-list" class="textarea-list"></div>
                <button id="add-prompt-btn">新增 prompt</button>
              </div>

              <div class="field">
                <label>check_points</label>
                <div id="check-point-list" class="token-list"></div>
                <div class="inline-add">
                  <input id="check-point-input" type="text" placeholder="check_point" />
                  <button data-add="check_points">添加</button>
                </div>
              </div>

              <div class="field">
                <label for="pass-rule">pass_rule</label>
                <textarea id="pass-rule" rows="3" placeholder="pass_rule"></textarea>
              </div>

              <div id="validation-box" class="validation-box"></div>
            </section>

            <section class="card ref-card right-panel">
              <div class="field no-gap">
                <div class="field-row">
                  <label>参考图 / 参考素材</label>
                </div>
                <label id="ref-dropzone" class="ref-dropzone unified-dropzone">
                  <input id="ref-upload" type="file" accept="image/*" multiple hidden />
                  <strong>拖拽图片/链接或点击上传</strong>
                </label>
                <div id="ref-grid" class="ref-grid empty">无参考图</div>
              </div>
            </section>
          </div>
        </section>

        <section id="json-preview-panel" class="card hidden">
          <div class="field no-gap">
            <div class="field-row">
              <label>case.json</label>
              <button id="close-json-preview-btn" class="ghost-btn" type="button">收起</button>
            </div>
            <pre id="json-preview-content" class="json-preview"></pre>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
